version: '3'
services:
  mariadb:
    image: mariadb:latest
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword_rahasia
      MYSQL_DATABASE: db_iot
      MYSQL_USER: admin_iot
      MYSQL_PASSWORD: password_rahasia
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always

volumes:
  mariadb_data:
